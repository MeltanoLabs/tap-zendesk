name: Test tap-zendesk

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci_workflow.yml
      - tap_zendesk/**
      - pyproject.toml
      - tox.ini
      - uv.lock
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci_workflow.yml
      - tap_zendesk/**
      - pyproject.toml
      - tox.ini
      - uv.lock
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  linting:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx --with tox-uv tox -e lint

  pytest:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test with pytest
        env:
          TAP_ZENDESK_SUBDOMAIN: ${{ secrets.TAP_ZENDESK_SUBDOMAIN }}
          TAP_ZENDESK_EMAIL: ${{ secrets.TAP_ZENDESK_EMAIL }}
          TAP_ZENDESK_API_TOKEN: ${{ secrets.TAP_ZENDESK_API_TOKEN }}
          TAP_ZENDESK_START_DATE: "2010-01-01T00:00:00Z"
        run: uv run pytest --capture=no
